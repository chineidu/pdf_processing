global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus_rules.yml
  - /etc/prometheus/prometheus_alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # API metrics endpoint. Keep both targets to support
  # host-run app and docker-compose app deployments.
  - job_name: pdf-processing-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
          - api:8000
